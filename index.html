<!DOCTYPE html><html lang="zh-Hant"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面試心得 · 公司特質能力分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/vis-network.min.js"></script>
<style>
:root{--bg:#080b12;--panel:rgba(17,23,37,.86);--panel-solid:#111726;--border:#22304a;--border2:#1a2438;
--txt:#e8edf6;--muted:#93a4c0;--dim:#5e708e;--c0:#e0a458;--c1:#5b8def;--c2:#4fd1a1;--c3:#a78bd6;
--accent:#7dd3fc;--accent2:#5eead4;--shadow:0 18px 50px rgba(0,0,0,.55)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:radial-gradient(1200px 700px at 78% -8%,rgba(91,141,239,.10),transparent 60%),radial-gradient(900px 600px at 8% 108%,rgba(79,209,161,.08),transparent 55%),var(--bg);
color:var(--txt);font-family:"Noto Sans TC","Sora",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
#net{position:fixed;inset:0;z-index:1}

header{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
padding:11px 20px;background:linear-gradient(180deg,rgba(8,11,18,.95),rgba(8,11,18,.6) 75%,transparent);backdrop-filter:blur(6px);border-bottom:1px solid var(--border2)}
.brand h1{font-family:"Sora";font-weight:800;font-size:18px;letter-spacing:.2px;background:linear-gradient(92deg,#fff,#a9c6ff 60%,#7de3c9);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .sub{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:4px}
.tab{font-size:13px;font-weight:600;color:var(--muted);padding:7px 16px;border-radius:8px;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:.15s}
.tab:hover{color:#fff}
.tab.on{color:#06121d;background:linear-gradient(92deg,#9ce0ff,#6ee7c7)}
.gctrl{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
body[data-page="explore"] .gctrl{display:none}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;color:var(--dim);letter-spacing:.6px;text-transform:uppercase;display:flex;justify-content:space-between;gap:10px}
.field label .v{color:var(--accent);font-family:"IBM Plex Mono";font-weight:600}
input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:4px;border-radius:4px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--p,40%),#2a3850 var(--p,40%));outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#eaf6ff;border:2px solid var(--accent);box-shadow:0 0 10px rgba(125,211,252,.6);cursor:pointer}
.toggles{display:flex;gap:7px;flex-wrap:wrap}
.tg{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:7px 11px;border-radius:9px;cursor:pointer;user-select:none;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tg:hover{border-color:#3a4d70;color:#fff}
.tg .dot{width:7px;height:7px;border-radius:50%;background:#3a4d70;transition:.15s}
.tg.on{color:#eaf6ff;border-color:var(--accent);background:rgba(125,211,252,.10)}
.tg.on .dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}

.page{position:fixed;inset:0;z-index:2;display:none}
.page.active{display:block}
#page-graph{z-index:1}

/* graph overlays */
.gsearch{position:fixed;z-index:25;top:70px;right:20px;width:240px}
.gsearch input,.exp-pick input{width:100%;padding:10px 13px;border-radius:11px;border:1px solid var(--border);background:var(--panel);color:var(--txt);font-family:inherit;font-size:13px;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
.gsearch input:focus,.exp-pick input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(125,211,252,.12)}
.legend{position:fixed;z-index:25;left:20px;top:70px;width:232px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px;backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.legend h3{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.lg-item{display:flex;gap:10px;align-items:flex-start;padding:7px 8px;border-radius:9px;cursor:pointer;transition:.15s;margin-bottom:2px}
.lg-item:hover{background:rgba(255,255,255,.04)}.lg-item.off{opacity:.32}
.lg-sw{width:13px;height:13px;border-radius:4px;margin-top:3px;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.15) inset}
.lg-tx .nm{font-size:13px;font-weight:700;line-height:1.25}.lg-tx .ds{font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.3}.lg-tx .ct{font-family:"IBM Plex Mono";font-size:10px;color:var(--dim);margin-top:2px}
.legend .hint{font-size:10px;color:var(--dim);margin-top:9px;padding-top:9px;border-top:1px solid var(--border2);line-height:1.5}
.rank{position:fixed;z-index:25;left:20px;bottom:20px;width:232px;background:var(--panel);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(10px);box-shadow:var(--shadow);overflow:hidden}
.rank .hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer}
.rank .hd h3{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-weight:600}.rank .hd .cv{color:var(--muted);font-size:13px;transition:.2s}.rank.collapsed .cv{transform:rotate(-90deg)}
.rank .bd{max-height:210px;overflow-y:auto;padding:0 8px 10px}.rank.collapsed .bd{display:none}
.rk{display:flex;align-items:center;gap:9px;padding:6px 7px;border-radius:8px;cursor:pointer;transition:.12s}.rk:hover{background:rgba(255,255,255,.05)}
.rk .pos{font-family:"IBM Plex Mono";font-size:11px;color:var(--dim);width:18px;text-align:right}.rk .bar{height:6px;border-radius:3px;flex:1;min-width:8px;opacity:.85}.rk .nm{font-size:11.5px;max-width:115px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zoombar{position:fixed;z-index:25;left:50%;transform:translateX(-50%);bottom:18px;display:flex;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:5px;backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.zoombar button{width:36px;height:36px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono"}
.zoombar button:hover{background:rgba(125,211,252,.14);color:#fff}.zoombar .sep{width:1px;background:var(--border2);margin:4px 1px}.zoombar .hintk{align-self:center;font-size:10px;color:var(--dim);padding:0 8px;max-width:120px;line-height:1.2}

/* detail panel (graph) */
.detail{position:fixed;z-index:28;right:0;width:370px;max-width:92vw;background:linear-gradient(180deg,var(--panel-solid),#0d1320);border-left:1px solid var(--border);box-shadow:-20px 0 60px rgba(0,0,0,.6);transform:translateX(102%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail.open{transform:translateX(0)}
.dt-hd{padding:18px 20px 14px;border-bottom:1px solid var(--border2);position:relative}
.dt-hd .close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.dt-hd .close:hover{background:rgba(255,255,255,.1);color:#fff}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:8px}.badge .d{width:7px;height:7px;border-radius:50%}
.dt-hd h2{font-family:"Sora";font-size:17px;font-weight:700;line-height:1.3;padding-right:34px}
.dt-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 20px;border-bottom:1px solid var(--border2)}
.met{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:9px 10px}.met .v{font-family:"Sora";font-weight:700;font-size:15px}.met .k{font-size:9.5px;color:var(--dim);margin-top:1px}.met .rk2{font-family:"IBM Plex Mono";font-size:9.5px;color:var(--accent);margin-top:2px}
.dt-body{overflow-y:auto;padding:16px 20px 26px;flex:1}
.sec{margin-bottom:18px}.sec h4{font-size:11px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}.sec h4::after{content:"";flex:1;height:1px;background:var(--border2)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--muted)}
.chip.cn{background:rgba(125,211,252,.10);border-color:rgba(125,211,252,.32);color:#bfe9ff}
.sim{display:flex;flex-direction:column;gap:7px}
.sm{padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid var(--border2);cursor:pointer;transition:.15s}.sm:hover{border-color:var(--accent);background:rgba(125,211,252,.06)}
.sm .top{display:flex;justify-content:space-between;align-items:center;gap:8px}.sm .nm{font-size:12.5px;font-weight:600;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sm .w{font-family:"IBM Plex Mono";font-size:11px;color:var(--accent2);font-weight:600;white-space:nowrap}.sm .sh{font-size:10.5px;color:var(--dim);margin-top:4px;line-height:1.45}
.empty{color:var(--dim);font-size:12px;text-align:center;padding:24px 10px;line-height:1.6}

/* explorer page */
#page-explore{overflow-y:auto}
.exp-wrap{max-width:920px;margin:0 auto;padding:88px 22px 60px}
.exp-pick{position:sticky;top:64px;z-index:5;padding:10px 0 14px;background:linear-gradient(180deg,var(--bg) 70%,transparent)}
.exp-pick .lbl{font-size:12px;color:var(--muted);margin-bottom:7px}
.exp-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.exp-card h2{font-family:"Sora";font-size:23px;font-weight:800;line-height:1.3}
.exp-summary{font-size:14px;line-height:1.75;color:#cdd9ec;margin:14px 0 4px;padding:14px 16px;background:rgba(125,211,252,.06);border:1px solid rgba(125,211,252,.18);border-radius:12px}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
@media(max-width:680px){.exp-grid{grid-template-columns:1fr}}
.cat{background:rgba(255,255,255,.025);border:1px solid var(--border2);border-radius:14px;padding:15px 16px}
.cat h3{font-size:12.5px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.cat h3 .ic{width:8px;height:8px;border-radius:3px}
.cat ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.cat li{font-size:13px;line-height:1.5;color:#d7e0ef;padding-left:16px;position:relative}
.cat li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent2);opacity:.7}
.exp-sim{margin-top:22px}
.exp-sim h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--accent2);letter-spacing:.3px}
.exp-sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:680px){.exp-sim-grid{grid-template-columns:1fr}}
.exp-prompt{text-align:center;color:var(--dim);padding:70px 20px;font-size:14px;line-height:1.8}
.exp-prompt .big{font-size:40px;margin-bottom:10px;opacity:.6}

#load{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:18px;transition:opacity .5s}
#load.hide{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border:3px solid #1d2942;border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}#load .t{font-family:"Sora";font-size:14px;color:var(--muted)}#load .t b{color:var(--accent)}
@media(max-width:880px){.legend,.rank,.zoombar{display:none}.gsearch{top:auto;bottom:16px;right:12px;left:12px;width:auto}.gctrl{width:100%;margin-left:0;justify-content:space-between}.detail{width:100%}}
</style></head><body data-page="graph">

<header>
  <div class="brand"><h1>公司特質能力分析</h1><div class="sub">面試心得 · 447 家公司</div></div>
  <div class="tabs">
    <button class="tab on" data-pg="graph">關係網絡圖</button>
    <button class="tab" data-pg="explore">公司查詢</button>
  </div>
  <div class="gctrl">
    <div class="field"><label>共同特質/能力 ≥ <span class="v" id="thrv">9</span></label><input type="range" id="thr" min="6" max="13" value="9"></div>
    <div class="toggles">
      <div class="tg on" id="tgIso"><span class="dot"></span>隱藏孤立</div>
      <div class="tg" id="tgLbl"><span class="dot"></span>全部標籤</div>
      <div class="tg" id="tgReset"><span class="dot" style="background:var(--accent2)"></span>重置佈局</div>
    </div>
  </div>
</header>

<div id="page-graph" class="page active">
  <div id="net"></div>
  <div class="gsearch"><input id="gsearch" list="colist" placeholder="🔍 搜尋公司…" autocomplete="off"></div>
  <div class="legend"><h3>顏色分群 ｜ 點擊可篩選</h3><div id="lg-items"></div>
    <div class="hint">高度相似的公司聚在同一群、群間有間隔。圓點越大＝中心性越高。「特色分散群」預設隱藏，點它可開啟。</div></div>
  <div class="rank collapsed" id="rank"><div class="hd" id="rankHd"><h3>中心性排行 Top 15</h3><span class="cv">▾</span></div><div class="bd" id="rankBody"></div></div>
  <div class="detail" id="detail"><div class="dt-hd"><button class="close" id="dtClose">×</button><div id="dt-badge"></div><h2 id="dt-name"></h2></div><div class="dt-metrics" id="dt-metrics"></div><div class="dt-body" id="dt-body"></div></div>
  <div class="zoombar"><button id="zout" title="縮小">−</button><button id="zin" title="放大">＋</button><div class="sep"></div><button id="zfit" title="全覽">⤢</button><div class="hintk">滾輪縮放 · 拖曳平移 · 點空白取消</div></div>
</div>

<div id="page-explore" class="page">
  <div class="exp-wrap">
    <div class="exp-pick"><div class="lbl">選擇或輸入公司名稱：</div><input id="esearch" list="colist" placeholder="例如：世和豐科技…" autocomplete="off"></div>
    <div id="exp-content"><div class="exp-prompt"><div class="big">🏢</div>輸入或選擇上方的公司，<br>即可看到它的簡介、四大分類特質能力，以及最相似的公司。</div></div>
  </div>
</div>

<datalist id="colist"></datalist>

function applyEdges(){
  const upd=[],vd={};
  E.forEach(([a,b,w],i)=>{const show=w>=curThr&&commVisible[byId[a].comm]&&commVisible[byId[b].comm];upd.push({id:i,hidden:!show});if(show){vd[a]=(vd[a]||0)+1;vd[b]=(vd[b]||0)+1;}});
  edgesDS.update(upd);
  nodesDS.update(N.map(n=>({id:n.id,hidden:!commVisible[n.comm]||(hideIso&&!(vd[n.id]>0))})));
}
function applyLabels(){nodesDS.update(N.map(n=>({id:n.id,label:(showAllLbl||rankOf[n.id]<=30)?clean(n.name):undefined})));}
function highlightNeighborhood(id){const nb=new Set([id]);adj[id].forEach(([m,w])=>{if(w>=curThr)nb.add(m);});
  nodesDS.update(N.map(n=>{const on=nb.has(n.id),c=baseColor(n.id);return on?{id:n.id,opacity:1,borderWidth:n.id===id?3:1,color:{background:c,border:n.id===id?'#fff':c,highlight:{background:c,border:'#fff'},hover:{background:c,border:'#fff'}}}:{id:n.id,opacity:.18,borderWidth:1,color:{background:'#27314a',border:'#27314a',highlight:{background:'#27314a',border:'#fff'},hover:{background:'#27314a',border:'#9fb2cf'}}};}));}
function clearHighlight(){nodesDS.update(N.map(n=>{const c=baseColor(n.id);return{id:n.id,opacity:1,borderWidth:1,color:{background:c,border:c,highlight:{background:c,border:'#fff'},hover:{background:c,border:'#fff'}}};}));}

const thr=document.getElementById('thr'),thrv=document.getElementById('thrv');
function fill(){thr.style.setProperty('--p',(thr.value-thr.min)/(thr.max-thr.min)*100+'%');}
thr.addEventListener('input',()=>{curThr=+thr.value;thrv.textContent=thr.value;fill();applyEdges();if(selectedId!=null)highlightNeighborhood(selectedId);});fill();
document.getElementById('tgIso').addEventListener('click',e=>{hideIso=!hideIso;e.currentTarget.classList.toggle('on',hideIso);applyEdges();if(selectedId!=null)highlightNeighborhood(selectedId);});
document.getElementById('tgLbl').addEventListener('click',e=>{showAllLbl=!showAllLbl;e.currentTarget.classList.toggle('on',showAllLbl);applyLabels();});
document.getElementById('tgReset').addEventListener('click',()=>{nodesDS.update(N.map(n=>({id:n.id,x:POS[n.id]?POS[n.id][0]:0,y:POS[n.id]?POS[n.id][1]:0})));net.fit({animation:{duration:600}});});

const lgWrap=document.getElementById('lg-items');const cc=[0,0,0,0];N.forEach(n=>cc[n.comm]++);
COMM.forEach((c,i)=>{const d=document.createElement('div');d.className='lg-item'+(commVisible[i]?'':' off');d.dataset.i=i;
  d.innerHTML=`<div class="lg-sw" style="background:${c.color}"></div><div class="lg-tx"><div class="nm">${c.name}</div><div class="ds">${c.sub}</div><div class="ct mono">${cc[i]} 家公司</div></div>`;
  d.addEventListener('click',()=>{commVisible[i]=!commVisible[i];d.classList.toggle('off',!commVisible[i]);applyEdges();if(selectedId!=null)highlightNeighborhood(selectedId);});lgWrap.appendChild(d);});

const rb=document.getElementById('rankBody');
ranked.slice(0,15).forEach((n,i)=>{const c=COMM[n.comm].color;const r=document.createElement('div');r.className='rk';
  r.innerHTML=`<span class="pos">${i+1}</span><span class="nm" title="${n.name}">${clean(n.name)}</span><span class="bar" style="background:${c};max-width:${Math.max(8,n.wdeg/maxW*70)}px"></span>`;
  r.addEventListener('click',()=>selectNode(n.id,true));rb.appendChild(r);});
document.getElementById('rankHd').addEventListener('click',()=>document.getElementById('rank').classList.toggle('collapsed'));

document.getElementById('gsearch').addEventListener('change',e=>{const n=byName[e.target.value];if(n)selectNode(n.id,true);});

const detail=document.getElementById('detail');
function renderDetail(n){const c=COMM[n.comm];
  document.getElementById('dt-badge').innerHTML=`<span class="badge" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}55"><span class="d" style="background:${c.color}"></span>${c.name}</span>`;
  document.getElementById('dt-name').textContent=n.name;
  document.getElementById('dt-metrics').innerHTML=`<div class="met"><div class="v">${n.deg}</div><div class="k">直接連結數</div><div class="rk2 mono">#${rDeg[n.id]}</div></div><div class="met"><div class="v">${Math.round(n.wdeg)}</div><div class="k">加權中心度</div><div class="rk2 mono">#${rankOf[n.id]}</div></div><div class="met"><div class="v">${n.eig.toFixed(2)}</div><div class="k">特徵向量</div><div class="rk2 mono">#${rEig[n.id]}</div></div>`;
  const sims=adj[n.id].slice(0,8).map(([m,w])=>{const sh=shareConcepts(n.id,m);return `<div class="sm" data-go="${m}"><div class="top"><span class="nm">${byId[m].name}</span><span class="w">${w} 共同點</span></div><div class="sh">${sh.map(x=>`<span style="color:#bfe9ff">·${x}</span>`).join(' ')}</div></div>`;}).join('');
  document.getElementById('dt-body').innerHTML=`<div class="sec"><h4>歸納概念（${n.concepts.length}）</h4><div class="chips">${n.concepts.map(x=>`<span class="chip cn">${x}</span>`).join('')}</div></div><div class="sec"><h4>最相似公司</h4><div class="sim">${sims||'<div class="empty">特質/能力較獨特，共同點偏少。</div>'}</div></div><div class="sec"><h4>人格特質</h4><div class="chips">${(n.traits.map(t=>`<span class="chip">${t}</span>`).join(''))||'—'}</div></div><div class="sec"><h4>能力技能</h4><div class="chips">${(n.skills.map(s=>`<span class="chip">${s}</span>`).join(''))||'—'}</div></div>`;
  document.querySelectorAll('.sm[data-go]').forEach(el=>el.addEventListener('click',()=>selectNode(+el.dataset.go,true)));}
function selectNode(id,focus){selectedId=id;if(nodesDS.get(id)&&nodesDS.get(id).hidden)nodesDS.update({id,hidden:false});net.selectNodes([id]);highlightNeighborhood(id);renderDetail(byId[id]);detail.classList.add('open');if(focus)net.focus(id,{scale:1.1,animation:{duration:600,easingFunction:'easeInOutCubic'}});}
function closePanel(){selectedId=null;detail.classList.remove('open');net.unselectAll();clearHighlight();}
document.getElementById('dtClose').addEventListener('click',closePanel);
net.on('click',p=>{if(p.nodes.length)selectNode(p.nodes[0],false);else closePanel();});
net.on('doubleClick',p=>{if(p.nodes.length)net.focus(p.nodes[0],{scale:1.5,animation:{duration:500}});else net.fit({animation:{duration:500}});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
net.on('hoverNode',()=>container.style.cursor='pointer');net.on('blurNode',()=>container.style.cursor='default');
function zoomBy(f){const s=net.getScale()*f;net.moveTo({position:net.getViewPosition(),scale:s,animation:{duration:220}});}
document.getElementById('zin').addEventListener('click',()=>zoomBy(1.35));
document.getElementById('zout').addEventListener('click',()=>zoomBy(1/1.35));
document.getElementById('zfit').addEventListener('click',()=>net.fit({animation:{duration:600}}));
function fitPanelTop(){const hh=Math.ceil(document.querySelector('header').getBoundingClientRect().height)+6;detail.style.top=hh+'px';detail.style.height='calc(100% - '+hh+'px)';}
fitPanelTop();window.addEventListener('resize',fitPanelTop);
applyEdges();

/* ===================== EXPLORE PAGE ===================== */
const CATS=[['traits','人格特質','#5b8def'],['skills','能力技能','#4fd1a1'],['culture','公司文化','#e0a458'],['requirements','面試要求','#a78bd6']];
function renderExplore(id){
  const n=byId[id],c=COMM[n.comm];
  const cats=CATS.map(([k,lbl,col])=>{const arr=n[k]||[];return `<div class="cat"><h3><span class="ic" style="background:${col}"></span>${lbl}（${arr.length}）</h3><ul>${arr.map(x=>`<li>${x}</li>`).join('')||'<li style="color:var(--dim)">（無資料）</li>'}</ul></div>`;}).join('');
  const sims=adj[id].slice(0,8).map(([m,w])=>{const sh=shareConcepts(id,m);return `<div class="sm" data-exp="${m}"><div class="top"><span class="nm">${byId[m].name}</span><span class="w">${w} 共同點</span></div><div class="sh">${sh.map(x=>`<span style="color:#bfe9ff">·${x}</span>`).join(' ')}</div></div>`;}).join('');
  document.getElementById('exp-content').innerHTML=`<div class="exp-card">
    <span class="badge" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}55"><span class="d" style="background:${c.color}"></span>${c.name}</span>
    <h2>${n.name}</h2>
    <div class="exp-summary">${n.summary}</div>
    <div class="exp-grid">${cats}</div>
    <div class="exp-sim"><h3>🔗 類似公司（共同特質/能力最多）</h3><div class="exp-sim-grid">${sims||'<div class="empty">此公司特質/能力較獨特，與其他公司共同點偏少。</div>'}</div></div>
  </div>`;
  document.querySelectorAll('.sm[data-exp]').forEach(el=>el.addEventListener('click',()=>{const m=+el.dataset.exp;document.getElementById('esearch').value=byId[m].name;renderExplore(m);document.querySelector('#page-explore').scrollTo({top:0,behavior:'smooth'});}));
}
document.getElementById('esearch').addEventListener('change',e=>{const n=byName[e.target.value];if(n)renderExplore(n.id);});
document.getElementById('esearch').addEventListener('input',e=>{const n=byName[e.target.value];if(n)renderExplore(n.id);});

/* ===================== TABS ===================== */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  const pg=t.dataset.pg;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  document.body.dataset.page=pg;
  document.getElementById('page-graph').classList.toggle('active',pg==='graph');
  document.getElementById('page-explore').classList.toggle('active',pg==='explore');
  if(pg==='graph'){closePanel();setTimeout(()=>{net.setSize('100%','100%');net.redraw();fitPanelTop();},60);}
}));
</script></body></html>
